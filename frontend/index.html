<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能面试助手</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        min-width: 100vw;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
      }

      #app {
        position: fixed;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        min-width: 100vw;
        min-height: 100vh;
        overflow: hidden;
      }

      html.theme-dark,
      html.dark,
      body.theme-dark,
      body.dark,
      html.theme-dark #app,
      html.dark #app {
        background: #090a0f;
        color: #f3f4f6;
        color-scheme: dark;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
